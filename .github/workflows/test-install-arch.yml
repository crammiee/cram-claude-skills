name: Test install on Arch Linux

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test-install:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install prerequisites
        run: pacman -Syu --noconfirm --needed git curl

      - name: Checkout
        uses: actions/checkout@v4

      - name: Mark repo as safe (container runs as root)
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Run install.sh from local checkout
        run: sh ./install.sh

      - name: Verify skills symlinked (local-checkout mode)
        run: |
          set -eu
          for skill_path in skills/*/; do
            name=$(basename "$skill_path")
            dest="$HOME/.claude/skills/$name"
            [ -L "$dest" ] || { echo "::error::$dest is not a symlink"; exit 1; }
            [ -s "$dest/SKILL.md" ] || { echo "::error::$dest/SKILL.md missing or empty"; exit 1; }
            echo "OK: $name -> $(readlink -f "$dest")"
          done

      - name: Test curl-pipe bootstrap install (fresh HOME)
        env:
          CRAM_SKILLS_REPO_URL: ${{ github.server_url }}/${{ github.repository }}.git
          CRAM_SKILLS_REPO_DIR: /tmp/bootstrap-checkout
        run: |
          set -eu
          export HOME=/tmp/bootstrap-home
          mkdir -p "$HOME"
          git config --global --add safe.directory "$CRAM_SKILLS_REPO_DIR"
          # Mirrors: script="$(curl -fsSL https://raw.githubusercontent.com/.../install.sh)" && sh -c "$script"
          # but fetches the script at the exact commit under test, not `main`,
          # so this actually validates the change being reviewed. Using
          # `script=$(curl ...) && sh -c "$script"` (not `sh -c "$(curl ...)"`)
          # so a failed download fails this step instead of silently no-op'ing.
          raw_url="https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/install.sh"
          script="$(curl -fsSL "$raw_url")"
          sh -c "$script"

      - name: Verify skills symlinked (bootstrap mode)
        run: |
          set -eu
          for skill_path in skills/*/; do
            name=$(basename "$skill_path")
            dest="/tmp/bootstrap-home/.claude/skills/$name"
            [ -L "$dest" ] || { echo "::error::$dest is not a symlink"; exit 1; }
            [ -s "$dest/SKILL.md" ] || { echo "::error::$dest/SKILL.md missing or empty"; exit 1; }
            echo "OK: $name -> $(readlink -f "$dest")"
          done

      - name: uninstall.sh leaves a real (non-symlink) skill dir alone
        run: |
          set -eu
          dest="$HOME/.claude/skills/cram-plan-feature"
          rm -rf "$dest"
          mkdir -p "$dest"
          echo "pre-existing real content" > "$dest/SKILL.md"
          sh ./uninstall.sh
          [ -f "$dest/SKILL.md" ] || { echo "::error::uninstall.sh deleted a real (non-symlink) skill dir instead of skipping it"; exit 1; }
          grep -qx "pre-existing real content" "$dest/SKILL.md" || { echo "::error::uninstall.sh altered a real skill dir's content"; exit 1; }
          echo "OK: real non-symlink dir left untouched"
          rm -rf "$dest"

      - name: uninstall.sh from local checkout removes only its own symlinks
        run: |
          set -eu
          sh ./uninstall.sh
          for skill_path in skills/*/; do
            name=$(basename "$skill_path")
            dest="$HOME/.claude/skills/$name"
            [ -e "$dest" ] && { echo "::error::$dest still exists after uninstall"; exit 1; }
          done
          echo "OK: all local-checkout symlinks removed"

      - name: uninstall.sh is idempotent (safe to run with nothing installed)
        run: sh ./uninstall.sh

      - name: uninstall.sh from bootstrap checkout removes its symlinks
        env:
          CRAM_SKILLS_REPO_DIR: /tmp/bootstrap-checkout
        run: |
          set -eu
          export HOME=/tmp/bootstrap-home
          sh /tmp/bootstrap-checkout/uninstall.sh
          for skill_path in skills/*/; do
            name=$(basename "$skill_path")
            dest="/tmp/bootstrap-home/.claude/skills/$name"
            [ -e "$dest" ] && { echo "::error::$dest still exists after uninstall"; exit 1; }
          done
          echo "OK: all bootstrap-mode symlinks removed"
